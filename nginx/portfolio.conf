# /etc/nginx/sites-available/portfolio
# Symlink: ln -s /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/

# Redirige HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tunombre.dev www.tunombre.dev;
    return 301 https://tunombre.dev$request_uri;
}

# Redirige www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.tunombre.dev;

    ssl_certificate     /etc/letsencrypt/live/tunombre.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tunombre.dev/privkey.pem;

    return 301 https://tunombre.dev$request_uri;
}

# Servidor principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tunombre.dev;

    # SSL (generado con Certbot)
    ssl_certificate     /etc/letsencrypt/live/tunombre.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tunombre.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Cache para assets estáticos de Next.js
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache para archivos públicos
    location /static/ {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # Proxy al contenedor Next.js
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Límite de tamaño de body (para el formulario de contacto)
    client_max_body_size 1m;
}

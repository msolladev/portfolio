name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite lanzar manualmente desde GitHub

# Cancela deploys anteriores si llega otro push
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── 1. Checks ──────────────────────────────────────────
  checks:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install pnpm globally
        run: npm install -g pnpm@latest

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint -- --no-interactive

  # ── 2. Build & push imagen Docker ──────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/portfolio:latest
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy en el VPS ────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Login al registry
            echo ${{ secrets.GITHUB_TOKEN }} | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull imagen nueva
            docker pull ghcr.io/${{ github.repository_owner }}/portfolio:latest

            docker network create web || true

            # Recrear el contenedor con zero-downtime básico
            cd ~/portfolio
            docker compose up -d --force-recreate --no-build

            # Limpieza de imágenes antiguas
            docker image prune -f

            echo "✅ Deploy completado"